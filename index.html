<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Snake.exe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="window">
  <div class="title-bar">
    <div class="title-bar-text">Snake.exe</div>
    <div class="title-bar-controls">
      <button aria-label="Minimize"></button>
      <button aria-label="Maximize"></button>
      <button aria-label="Close" onclick="location.reload()"></button>
    </div>
  </div>

  <div class="window-body">
    <div id="mainContent">
      <p style="text-align: center;">Welcome to the 16-bit Snake Emulator.</p>
      <div class="field-row" style="justify-content: center;">
        <button id="playButton">Start Game</button>
      </div>
    </div>

    <div id="gameUI" style="display: none;">
        <div id="score-container">Score: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="380" height="380"></canvas>
        
        <div id="touchControls" style="display: none; gap: 5px; margin-top: 10px;">
            <button onclick="changeDirection('up')">▲</button>
            <div style="display: flex; gap: 5px;">
                <button onclick="changeDirection('left')">◀</button>
                <button onclick="changeDirection('down')">▼</button>
                <button onclick="changeDirection('right')">▶</button>
            </div>
        </div>
    </div>

    <div id="gameOver" style="display: none; text-align: center;">
        <p>PROGRAM ILLEGAL OPERATION: SNAKE DIED</p>
        <button id="touchRestart">Restart</button>
    </div>
  </div>

  <div class="status-bar">
    <p class="status-bar-field">Press Arrows to move</p>
    <p class="status-bar-field">CPU: 100%</p>
    <p class="status-bar-field" id="muteButton" style="cursor: pointer;">Sound: On</p>
  </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const playButton = document.getElementById("playButton");
const mainContent = document.getElementById("mainContent");
const gameUI = document.getElementById("gameUI");
const gameOverScreen = document.getElementById("gameOver");
const touchRestart = document.getElementById("touchRestart");
const touchControls = document.getElementById("touchControls");
const scoreDisplay = document.getElementById("score");

const GRID_SIZE = 20;
const TILE_COUNT = canvas.width / GRID_SIZE;

let snake;
let direction;
let nextDirection;
let food;
let score;
let gameInterval;
let gameRunning = false;

/* ===================== INIT ===================== */

function initGame() {
  mainContent.style.display = "none";
  gameOverScreen.style.display = "none";
  gameUI.style.display = "flex";
  gameUI.style.flexDirection = "column";
  gameUI.style.alignItems = "center";

  if (isMobile()) {
    touchControls.style.display = "flex";
  }

  snake = [{ x: 9, y: 9 }];
  direction = { x: 1, y: 0 };
  nextDirection = direction;
  score = 0;
  scoreDisplay.textContent = score;

  placeFood();
  draw();

  clearInterval(gameInterval);
  gameInterval = setInterval(gameLoop, 100);
  gameRunning = true;
}

/* ===================== GAME LOOP ===================== */

function gameLoop() {
  direction = nextDirection;

  const head = {
    x: snake[0].x + direction.x,
    y: snake[0].y + direction.y
  };

  if (isCollision(head)) {
    endGame();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreDisplay.textContent = score;
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

/* ===================== HELPERS ===================== */

function isCollision(pos) {
  return (
    pos.x < 0 ||
    pos.y < 0 ||
    pos.x >= TILE_COUNT ||
    pos.y >= TILE_COUNT ||
    snake.some(segment => segment.x === pos.x && segment.y === pos.y)
  );
}

function placeFood() {
  do {
    food = {
      x: Math.floor(Math.random() * TILE_COUNT),
      y: Math.floor(Math.random() * TILE_COUNT)
    };
  } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
}

function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw snake
  ctx.fillStyle = "#00ff00";
  snake.forEach(part => {
    ctx.fillRect(
      part.x * GRID_SIZE,
      part.y * GRID_SIZE,
      GRID_SIZE - 2,
      GRID_SIZE - 2
    );
  });

  // Draw food
  ctx.fillStyle = "red";
  ctx.fillRect(
    food.x * GRID_SIZE,
    food.y * GRID_SIZE,
    GRID_SIZE - 2,
    GRID_SIZE - 2
  );
}

function changeDirection(dir) {
  const moves = {
    left: { x: -1, y: 0 },
    right: { x: 1, y: 0 },
    up: { x: 0, y: -1 },
    down: { x: 0, y: 1 }
  };

  const newDir = moves[dir];

  // Prevent reversing
  if (
    newDir.x === -direction.x &&
    newDir.y === -direction.y
  ) return;

  nextDirection = newDir;
}

function endGame() {
  clearInterval(gameInterval);
  gameRunning = false;
  gameUI.style.display = "none";
  gameOverScreen.style.display = "block";
}

function isMobile() {
  return /Mobi|Android|iPhone/i.test(navigator.userAgent);
}

/* ===================== CONTROLS ===================== */

document.addEventListener("keydown", e => {
  if (!gameRunning && e.key.toLowerCase() === "r") {
    initGame();
    return;
  }

  if (!gameRunning) return;

  if (e.key === "ArrowLeft") changeDirection("left");
  if (e.key === "ArrowRight") changeDirection("right");
  if (e.key === "ArrowUp") changeDirection("up");
  if (e.key === "ArrowDown") changeDirection("down");
});

playButton.onclick = initGame;
touchRestart.onclick = initGame;
</script>
</body>
</html>
